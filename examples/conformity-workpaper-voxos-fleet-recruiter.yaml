      Fleet Recruiter is high-risk under Annex III #4(a); the full risk-management
      lifecycle in Art. 9(1)-(9) applies.
    current_control: >-
      Risk register maintained in docs/risk/AI-SYS-0002-risk-register.yaml,
      reviewed quarterly, with 17 enumerated residual risks and named
      mitigations keyed to Art. 9(2)(a)-(d).
    evidence:
