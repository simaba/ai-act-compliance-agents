      geographic-distribution check across all five Member States in scope.
    current_control: >-
      Data sheet in docs/data/training-dataset.md covering collection,
      consent basis, bias-examination methodology, and Member-State
      representativeness for DE/NL/PL.
    evidence:
      - type: data_sheet
        ref: docs/data/training-dataset.md
        version: '2.1.0'
        date: '2026-04-05'
        signatory: data-governance@voxos.example
    gap: >-
      Representativeness analysis for ES and FR is not yet complete. Pending
      2026-Q2 sourcing of additional validation samples.
    owner: data-governance@voxos.example
    priority: P1
    due: '2026-06-30'
    status: open
    last_updated: '2026-04-19'

