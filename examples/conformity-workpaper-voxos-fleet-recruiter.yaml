  - id: CONF-0004
    article: Art. 12
    requirement: Automatic recording of events (logs) over the system's lifetime.
    applicability: applicable
    applicability_reason: Art. 12(1) requires logs sufficient to ensure traceability.
    current_control: >-
      Inference logging pipeline captures (input hash, model version, score,
      rationale tokens, operator id) for every scoring call and retains logs
      in tamper-evident WORM storage for 10 years per Art. 18.
    evidence:
      - type: log_sample
        ref: docs/logs/sample-inference-log-2026-04-10.jsonl
        date: '2026-04-10'
        signatory: platform-sre@voxos.example
      - type: design_doc
        ref: docs/platform/log-retention.md
        version: '1.0.0'
        date: '2026-03-15'
    owner: platform-sre@voxos.example
    priority: P0
    status: closed
    last_updated: '2026-04-19'

  - id: CONF-0005
    article: Art. 13
    requirement: Transparency and provision of information to deployers.
    applicability: applicable
    applicability_reason: >-
      Fleet operators (deployers) need instructions for use under
      Art. 13(1), including characteristics, capabilities, and limitations.
    current_control: >-
      Instructions for Use published to every deploying fleet operator,
      including intended-purpose statement, foreseeable misuse list, score
      interpretation guide, and mandatory human-review steps.
    evidence:
      - type: design_doc
        ref: docs/customer/instructions-for-use-v1.0.pdf
        version: '1.0.0'
        date: '2026-04-01'
        signatory: product-manager@voxos.example
    owner: product-manager@voxos.example
    priority: P0
    status: closed
    last_updated: '2026-04-19'

  - id: CONF-0006
